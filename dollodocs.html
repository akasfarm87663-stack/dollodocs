<div style="margin-top:20px; padding:15px; background:rgba(233,69,96,0.1); border-radius:12px;">
  <h3 style="color:#ff9e6d; margin-bottom:10px;">➕ Tambah Data Lokal</h3>
  <input type="text" id="newTitle" placeholder="Judul baru" style="width:100%; padding:8px; margin:5px 0; border-radius:6px; border:none;">
  <textarea id="newDesc" placeholder="Deskripsi..." style="width:100%; padding:8px; margin:5px 0; border-radius:6px; border:none; min-height:60px;"></textarea>
  <button onclick="addLocalData()" style="background:#e94560; color:white; border:none; padding:8px 20px; border-radius:20px; cursor:pointer; margin-top:5px;">Simpan</button>
</div>

<script>
function addLocalData() {
  const title = document.getElementById('newTitle').value.trim();
  const desc = document.getElementById('newDesc').value.trim();
  if (!title || !desc) return alert('Isi judul dan deskripsi!');
  
  const newItem = {
    id: Date.now(),
    title: title,
    description: desc
  };
  
  sheetData.unshift(newItem); // Tambah ke awal
  filteredData = [...sheetData];
  saveToLocalStorage(sheetData);
  renderMenu();
  selectItem(newItem.id);
  
  document.getElementById('newTitle').value = '';
  document.getElementById('newDesc').value = '';
  updateStatus('✅ Data lokal ditambahkan!', true);
}
</script>
