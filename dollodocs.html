<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull Theme - Formula Calculator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a1a 100%);
            min-height: 100vh;
            font-family: 'Orbitron', monospace;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Animated Background Skulls */
        .bg-skull {
            position: fixed;
            font-size: 200px;
            opacity: 0.03;
            z-index: -1;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header dengan Skull */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .skull-icon {
            font-size: 80px;
            display: block;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.8));
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.8)); }
            to { filter: drop-shadow(0 0 40px rgba(0, 255, 255, 0.8)); }
        }

        h1 {
            font-family: 'Creepster', cursive;
            font-size: 3.5em;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
            letter-spacing: 3px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: #888;
            margin-top: 10px;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        /* Formula Box */
        .formula-container {
            background: rgba(20, 20, 40, 0.8);
            border: 2px solid #ff00ff;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3),
                        inset 0 0 30px rgba(255, 0, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .formula-container::before {
            content: '☠';
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 40px;
            opacity: 0.2;
            color: #00ffff;
        }

        .formula-title {
            color: #00ffff;
            font-size: 1.5em;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-left: 4px solid #ff00ff;
            padding-left: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .formula-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #ff00ff;
            color: #00ff00;
            padding: 15px;
            font-family: 'Orbitron', monospace;
            font-size: 1.1em;
            border-radius: 8px;
            margin: 10px 0;
            transition: all 0.3s;
        }

        .formula-input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .btn-calculate {
            background: linear-gradient(45deg, #ff00ff, #9900ff);
            color: white;
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', monospace;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin: 20px 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(255, 0, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-calculate:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 0, 255, 0.6);
            background: linear-gradient(45deg, #ff33ff, #aa00ff);
        }

        .btn-calculate::before {
            content: '⚡';
            margin-right: 10px;
        }

        .result-box {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            font-size: 1.3em;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            display: none;
        }

        .result-box.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Table Styling */
        .skull-table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
            background: rgba(20, 20, 40, 0.6);
            border-radius: 10px;
            overflow: hidden;
        }

        .skull-table th {
            background: linear-gradient(135deg, #ff00ff, #9900ff);
            color: white;
            padding: 15px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            border-bottom: 3px solid #00ffff;
        }

        .skull-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.3);
            transition: all 0.3s;
        }

        .skull-table tr:hover td {
            background: rgba(255, 0, 255, 0.1);
            color: #00ffff;
            transform: scale(1.02);
        }

        .skull-table tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Decorative Elements */
        .bone-divider {
            text-align: center;
            margin: 40px 0;
            font-size: 30px;
            color: #ff00ff;
            letter-spacing: 20px;
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .skull-icon { font-size: 50px; }
            .formula-container { padding: 20px; }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Background Skulls -->
    <div class="bg-skull" style="top: 10%; left: 5%;">💀</div>
    <div class="bg-skull" style="top: 60%; right: 5%; animation-delay: -5s;">☠</div>
    <div class="bg-skull" style="bottom: 10%; left: 10%; animation-delay: -10s;">💀</div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <span class="skull-icon">☠️</span>
            <h1>SKULL FORMULA</h1>
            <p class="subtitle">Death Calculator v1.0</p>
        </div>

        <!-- Formula Section -->
        <div class="formula-container">
            <h2 class="formula-title">🦴 Masukkan Rumus Anda</h2>
            
            <input type="text" class="formula-input" id="formula" 
                   placeholder="Contoh: =A1+B1*C1">
            
            <input type="text" class="formula-input" id="variable1" 
                   placeholder="Variabel 1 (A1)">
            <input type="text" class="formula-input" id="variable2" 
                   placeholder="Variabel 2 (B1)">
            
            <div style="text-align: center;">
                <button class="btn-calculate" onclick="calculate()">
                    Hitung Sekarang
                </button>
            </div>

            <div class="result-box" id="result">
                <strong>💀 Hasil:</strong> <span id="resultValue">0</span>
            </div>
        </div>

        <div class="bone-divider">⚡  ⚡</div>

        <!-- Data Table -->
        <div class="formula-container">
            <h2 class="formula-title">📊 Tabel Data</h2>
            <table class="skull-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Variabel</th>
                        <th>Nilai</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>001</td>
                        <td>A1</td>
                        <td>100</td>
                        <td style="color: #00ff00;">✓ Aktif</td>
                    </tr>
                    <tr>
                        <td>002</td>
                        <td>B1</td>
                        <td>250</td>
                        <td style="color: #00ff00;">✓ Aktif</td>
                    </tr>
                    <tr>
                        <td>003</td>
                        <td>C1</td>
                        <td>75</td>
                        <td style="color: #ffff00;">⚠ Pending</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function calculate() {
            const formula = document.getElementById('formula').value;
            const var1 = parseFloat(document.getElementById('variable1').value) || 0;
            const var2 = parseFloat(document.getElementById('variable2').value) || 0;
            
            // Simple calculation example
            let result = var1 + var2;
            
            const resultBox = document.getElementById('result');
            const resultValue = document.getElementById('resultValue');
            
            resultValue.textContent = result.toLocaleString('id-ID');
            resultBox.classList.add('show');
            
            // Add skull animation
            setTimeout(() => {
                resultValue.innerHTML += ' 💀';
            }, 500);
        }

        // Add enter key support
        document.querySelectorAll('.formula-input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') calculate();
            });
        });
    </script>
</body>
</html>
