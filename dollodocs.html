<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Anime Data Hub | Line Togel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff6b9d;
            --primary-glow: rgba(255, 107, 157, 0.6);
            --secondary: #c44582;
            --accent: #ff9ec5;
            --cyan: #00f5d4;
            --purple: #9d50ff;
            --dark: #1a1a2e;
            --darker: #0f0f1a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --sidebar-width: 300px;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 🌌 Animated Background */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(157, 80, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 107, 157, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 245, 212, 0.08) 0%, transparent 70%),
                linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            animation: bgShift 20s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ✨ Particles Canvas */
        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* 🎌 Glass Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 25px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.3);
        }

        .sidebar-header {
            padding: 20px 25px 30px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 20px;
            position: relative;
        }

        .sidebar-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-shadow: 0 0 20px var(--primary-glow);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .logo-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 🔍 Search Box */
        .search-wrapper {
            padding: 0 20px 20px;
            position: relative;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: var(--transition);
        }

        .search-box input {
            width: 100%;
            padding: 14px 18px 14px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text);
            font-size: 0.9rem;
            transition: var(--transition);
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .search-box input:focus + i { color: var(--primary); }

        /* 📋 Menu Items */
        .menu-list {
            list-style: none;
            padding: 0 15px;
            flex: 1;
            overflow-y: auto;
        }

        .menu-item {
            margin: 6px 0;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.4s ease forwards;
        }

        .menu-item:nth-child(n) { animation-delay: calc(var(--i, 0) * 0.05s); }

        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 16px;
            transition: var(--transition);
            font-size: 0.92rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .menu-link::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .menu-link:hover::before { left: 100%; }

        .menu-link:hover,
        .menu-link.active {
            background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(157,80,255,0.2));
            color: var(--text);
            transform: translateX(4px);
            border: 1px solid var(--glass-border);
        }

        .menu-link.active {
            border-left: 3px solid var(--primary);
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.25);
        }

        .menu-link i {
            width: 22px;
            font-size: 1.1rem;
            text-align: center;
            transition: var(--transition);
        }

        .menu-link:hover i,
        .menu-link.active i {
            transform: scale(1.1);
            color: var(--primary);
        }

        .menu-link .badge {
            margin-left: auto;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            box-shadow: 0 2px 10px rgba(255, 107, 157, 0.4);
        }

        /* 🎀 Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px 40px;
            min-height: 100vh;
            transition: var(--transition);
        }

        /* 📊 Header Section */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--glass-border);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            background: linear-gradient(135deg, var(--text), var(--primary), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--primary), var(--purple), var(--cyan));
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.6);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--glass-border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            background: rgba(255, 107, 157, 0.1);
            transform: translateY(-2px);
        }

        .btn i { transition: var(--transition); }
        .btn:hover i { transform: scale(1.1); }

        /* 📦 Data Cards Grid */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .data-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 28px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.5s ease forwards;
        }

        .data-card:nth-child(n) { animation-delay: calc(var(--i, 0) * 0.1s); }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .data-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--cyan), var(--purple), var(--primary));
            background-size: 300% 100%;
            animation: gradientMove 4s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .data-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px var(--primary-glow);
        }

        .data-card:hover::before { opacity: 1; }

        .card-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
            font-size: 1.3rem;
            color: white;
            transition: var(--transition);
        }

        .data-card:hover .card-icon {
            transform: rotate(10deg) scale(1.1);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .card-desc {
            color: var(--text-muted);
            line-height: 1.8;
            font-size: 0.93rem;
            margin-bottom: 20px;
        }

        .card-desc br { margin: 6px 0; }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 18px;
            border-top: 1px dashed var(--glass-border);
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .card-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 107, 157, 0.15);
            padding: 5px 14px;
            border-radius: 20px;
            color: var(--primary);
            font-weight: 500;
        }

        .card-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--cyan);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }

        /* 💾 Storage Panel */
        .storage-panel {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .storage-item {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            transition: var(--transition);
        }

        .storage-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .storage-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0;
        }

        .storage-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 🌸 Decorative Elements */
        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.08;
            font-size: 4rem;
            animation: floatDecor 8s ease-in-out infinite;
        }

        .dec-1 { top: 15%; right: 8%; animation-delay: 0s; }
        .dec-2 { bottom: 20%; left: 5%; animation-delay: -2s; font-size: 3rem; }
        .dec-3 { top: 60%; right: 15%; animation-delay: -4s; font-size: 2.5rem; }

        @keyframes floatDecor {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            75% { transform: translateY(15px) rotate(-3deg); }
        }

        /* 📱 Mobile Toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 101;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .mobile-toggle:hover {
            background: rgba(255, 107, 157, 0.2);
            transform: scale(1.05);
        }

        /* 🎨 Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--purple));
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--secondary), var(--cyan));
        }

        /* 📱 Responsive */
        @media (max-width: 1100px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .mobile-toggle { display: flex; align-items: center; justify-content: center; }
            .data-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .content-header { flex-direction: column; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: center; }
            .btn { width: 100%; justify-content: center; }
        }

        /* ✨ Loading Animation */
        .skeleton {
            background: linear-gradient(90deg, var(--glass) 25%, rgba(255,255,255,0.15) 50%, var(--glass) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* 🎭 Tooltip */
        [data-tooltip] {
            position: relative;
            cursor: help;
        }

        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            padding: 8px 14px;
            background: var(--dark);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        [data-tooltip]:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <!-- 🌌 Background Effects -->
    <div class="bg-animation"></div>
    <canvas id="particles"></canvas>
    
    <!-- 🌸 Decorative Floating Elements -->
    <div class="decoration dec-1">🌸</div>
    <div class="decoration dec-2">✨</div>
    <div class="decoration dec-3">🎌</div>

    <!-- 🍔 Mobile Menu Button -->
    <button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
    </button>

    <!-- 🎌 Glass Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">🎮 ANIME HUB</div>
            <div class="logo-subtitle">Line Togel Manager</div>
        </div>
        
        <div class="search-wrapper">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari data..." onkeyup="filterData()">
                <i class="fas fa-search"></i>
            </div>
        </div>
        
        <ul class="menu-list" id="menuList">
            <!-- Dynamic menu items -->
        </ul>

        <!-- Sidebar Footer -->
        <div style="padding: 20px 25px; margin-top: auto; border-top: 1px solid var(--glass-border);">
            <div style="display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 0.85rem;">
                <div style="width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--purple)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">LT</div>
                <div>
                    <div style="font-weight: 500; color: var(--text);">Line Togel</div>
                    <div style="font-size: 0.75rem;">v2.0 ✨ Premium</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- 📦 Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="content-header">
            <div class="header-title">
                <h1>📊 Data Manager</h1>
                <p>Kelola data judul & deskripsi dari Google Sheets</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="refreshData()" data-tooltip="Muat ulang data">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <button class="btn btn-primary" onclick="exportData()" data-tooltip="Download sebagai HTML">
                    <i class="fas fa-file-export"></i> Export HTML
                </button>
            </div>
        </header>

        <!-- Data Cards -->
        <div class="data-grid" id="dataContainer">
            <!-- Dynamic cards -->
        </div>

        <!-- Storage Info Panel -->
        <div class="storage-panel">
            <div class="storage-item">
                <div class="storage-label">Total Data</div>
                <div class="storage-value" id="totalData">0</div>
                <div style="font-size: 0.75rem; color: var(--cyan);">items</div>
            </div>
            <div class="storage-item">
                <div class="storage-label">Storage</div>
                <div class="storage-value">Local</div>
                <div style="font-size: 0.75rem; color: var(--primary);">✓ Synced</div>
            </div>
            <div class="storage-item">
                <div class="storage-label">Source</div>
                <div class="storage-value">Sheets</div>
                <div style="font-size: 0.75rem; color: var(--purple);">Connected</div>
            </div>
            <div class="storage-item">
                <div class="storage-label">Updated</div>
                <div class="storage-value" id="lastUpdate">--:--</div>
                <div style="font-size: 0.75rem; color: var(--text-muted);">just now</div>
            </div>
        </div>
    </main>

    <script>
        // 🎨 Particles Animation System
        class ParticleSystem {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.resize();
                this.init();
                this.animate();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            init() {
                const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
                const colors = ['#ff6b9d', '#00f5d4', '#9d50ff', '#ff9ec5'];
                
                for (let i = 0; i < particleCount; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 3 + 1,
                        speedX: (Math.random() - 0.5) * 0.5,
                        speedY: (Math.random() - 0.5) * 0.5,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        opacity: Math.random() * 0.5 + 0.2
                    });
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.particles.forEach((p, i) => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    
                    if (p.x < 0 || p.x > this.canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > this.canvas.height) p.speedY *= -1;
                    
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fillStyle = `${p.color}${Math.floor(p.opacity * 255).toString(16).padStart(2, '0')}`;
                    this.ctx.fill();
                    
                    // Connect nearby particles
                    this.particles.slice(i + 1).forEach(p2 => {
                        const dx = p.x - p2.x;
                        const dy = p.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 120) {
                            this.ctx.beginPath();
                            this.ctx.moveTo(p.x, p.y);
                            this.ctx.lineTo(p2.x, p2.y);
