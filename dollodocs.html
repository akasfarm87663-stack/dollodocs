<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌸 seputar pk Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff6b9d;
      --secondary: #c471f5;
      --accent: #4facfe;
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --text: #f8f9fa;
      --text-muted: #b8c1cf;
      --sidebar-width: 260px;
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
      --border-radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark), #0f0f1e);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ✨ Sidebar Anime Style */
    .sidebar {
      width: var(--sidebar-width);
      background: linear-gradient(180deg, var(--bg-card), #0f0f1a);
      padding: 24px 16px;
      position: fixed;
      height: 100vh;
      border-right: 2px solid var(--primary);
      box-shadow: var(--shadow);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      text-align: center;
      padding: 16px 0 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
    }

    .sidebar-header h2 {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.5rem;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .sidebar-header .emoji {
      font-size: 1.8rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .nav-menu { list-style: none; flex: 1; overflow-y: auto; }
    .nav-item { margin: 6px 0; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .nav-link:hover, .nav-link.active {
      background: linear-gradient(90deg, rgba(255,107,157,0.2), rgba(79,172,254,0.2));
      color: var(--text);
      transform: translateX(4px);
      border-left: 3px solid var(--primary);
    }

    .nav-link .icon { font-size: 1.2rem; width: 24px; text-align: center; }

    .sidebar-footer {
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      margin-top: 8px;
    }
    .sync-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00c853;
      animation: pulse 2s infinite;
    }
    .sync-dot.error { background: #ff5252; animation: none; }
    .sync-dot.loading { background: #ffd54f; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    /* 🎀 Main Content */
    .main-content {
      margin-left: var(--sidebar-width);
      flex: 1;
      padding: 24px;
      max-width: calc(100% - var(--sidebar-width));
    }

    .page-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-header h1 {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.8rem;
      background: linear-gradient(45deg, var(--accent), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-header p { color: var(--text-muted); font-size: 0.95rem; }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(45deg, var(--accent), var(--secondary));
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,172,254,0.4); }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover { background: rgba(255,107,157,0.15); }

    .search-box {
      position: relative;
      margin-bottom: 20px;
    }
    .search-box input {
      width: 100%;
      padding: 12px 20px 12px 40px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.1);
      background: var(--bg-card);
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.3s;
    }
    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .search-box::before {
      content: "🔍";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      opacity: 0.7;
    }

    /* 📦 Data Cards Grid */
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .data-card {
      background: var(--bg-card);
      border-radius: var(--border-radius);
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .data-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
    }

    .data-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.4);
      border-color: var(--primary);
    }

    .card-title {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card-title .badge {
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .card-content {
      color: var(--text-muted);
      line-height: 1.7;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .card-footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px dashed rgba(255,255,255,0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      flex-wrap: wrap;
      gap: 8px;
    }

    .copy-btn {
      background: linear-gradient(45deg, var(--accent), var(--secondary));
      border: none;
      padding: 7px 14px;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .copy-btn:hover { transform: scale(1.03); box-shadow: 0 4px 14px rgba(79,172,254,0.4); }
    .copy-btn.copied { background: linear-gradient(45deg, #00c853, #00e676); }

    /* 📱 Loading & Empty States */
    .loading-state, .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }
    .loading-state .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; display: block; }
    .empty-state p { margin-bottom: 16px; }

    /* 🎨 Decorative Elements */
    .decoration {
      position: fixed; pointer-events: none; z-index: 0; opacity: 0.12;
      font-size: 3rem; animation: float 6s ease-in-out infinite;
    }
    .deco-1 { top: 8%; right: 4%; animation-delay: 0s; }
    .deco-2 { bottom: 12%; left: 2%; animation-delay: -2s; font-size: 2.5rem; }
    .deco-3 { top: 45%; right: 8%; animation-delay: -4s; font-size: 2rem; }

    /* 📱 Responsive */
    .menu-toggle {
      display: none;
      position: fixed; top: 16px; left: 16px; z-index: 1100;
      background: var(--primary); border: none;
      width: 46px; height: 46px; border-radius: 14px;
      color: white; font-size: 1.5rem; cursor: pointer;
      box-shadow: var(--shadow);
    }

    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(-100%);
        width: 280px;
      }
      .sidebar.active { transform: translateX(0); }
      .main-content { margin-left: 0; max-width: 100%; padding: 20px 16px; }
      .menu-toggle { display: flex; align-items: center; justify-content: center; }
      .page-header { flex-direction: column; align-items: flex-start; }
      .header-actions { width: 100%; justify-content: space-between; }
    }

    /* Toast Notification */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg-card); border-left: 4px solid var(--accent);
      padding: 14px 20px; border-radius: 12px;
      box-shadow: var(--shadow); z-index: 2000;
      display: flex; align-items: center; gap: 10px;
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
      max-width: 320px;
    }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); } }
  </style>
</head>
<body>

  <!-- 🎌 Mobile Toggle -->
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

  <!-- 🎀 Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2><span class="emoji">🌸</span> seputar pk</h2>
    </div>
    
    <ul class="nav-menu" id="categoryMenu">
      <li class="nav-item">
        <div class="nav-link active" onclick="filterData('all', this)">
          <span class="icon">🏠</span> Semua Data
        </div>
      </li>
      <!-- Dynamic categories will be inserted here -->
    </ul>

    <div class="sidebar-footer">
      <div class="sync-status">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">Menunggu sinkronisasi...</span>
      </div>
      <p style="margin-top:10px; font-size:0.7rem; opacity:0.7;">
        📊 Data dari Google Sheets<br>
        🗄️ Disimpan di localStorage
      </p>
    </div>
  </aside>

  <!-- 🎀 Main Content -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>📚 Koleksi Data Anime</h1>
        <p>Kolom A: Judul | Kolom B: Deskripsi</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" onclick="refreshData()">🔄 Refresh</button>
        <button class="btn btn-primary" onclick="exportData()">💾 Export JSON</button>
      </div>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari judul atau deskripsi..." onkeyup="searchData()">
    </div>

    <div class="data-grid" id="dataContainer">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>✨ Mengambil data dari Google Sheets...</p>
      </div>
    </div>
  </main>

  <!-- 🌸 Decorations -->
  <div class="decoration deco-1">🌸</div>
  <div class="decoration deco-2">⭐</div>
  <div class="decoration deco-3">🎀</div>

  <!-- 💫 JavaScript -->
  <script>
    // ⚙️ KONFIGURASI
    const CONFIG = {
      sheetId: '1xlBUoiw1h1LxL6I6JM58XHzWsOQtZX9glxt-ndwQO9k',
      gid: '0',
      csvUrl: 'https://docs.google.com/spreadsheets/d/1xlBUoiw1h1LxL6I6JM58XHzWsOQtZX9glxt-ndwQO9k/export?format=csv&gid=0',
      storageKey: 'anime_data_cache',
      cacheExpiry: 2 * 60 * 60 * 1000 // 2 jam
    };

    let allData = [];
    let categories = new Set();

    // 🚀 Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      setupEventListeners();
    });

    // 📥 Load Data (Cache + Fetch)
    async function loadData(forceRefresh = false) {
      updateSyncStatus('loading', 'Memeriksa cache...');
      
      const cached = localStorage.getItem(CONFIG.storageKey);
      
      if (cached && !forceRefresh) {
        try {
          const { data, timestamp } = JSON.parse(cached);
          if (Date.now() - timestamp < CONFIG.cacheExpiry) {
            console.log('✅ Using cached data');
            allData = data;
            renderData(data);
            updateSyncStatus('success', `Cache: ${formatTime(timestamp)}`);
            return;
          }
        } catch(e) { console.warn('Cache corrupt, fetching fresh...'); }
      }

      try {
        updateSyncStatus('loading', 'Mengambil data dari Sheets...');
        const response = await fetch(CONFIG.csvUrl);
        if (!response.ok) throw new Error('Gagal mengambil CSV');
        
        const csvText = await response.text();
        const parsed = parseCSV(csvText);
        
        // Simpan ke cache
        localStorage.setItem(CONFIG.storageKey, JSON.stringify({
          data: parsed,
          timestamp: Date.now()
        }));
        
        allData = parsed;
        renderData(parsed);
        updateSyncStatus('success', `Terbaru: ${new Date().toLocaleTimeString('id-ID')}`);
        
        // Auto-refresh setiap 30 menit jika halaman tetap terbuka
        setTimeout(() => loadData(false), 30 * 60 * 1000);
        
      } catch (error) {
        console.error('❌ Error:', error);
        updateSyncStatus('error', 'Gagal sinkronisasi');
        
        // Fallback ke cache jika ada
        if (cached) {
          try {
            const { data } = JSON.parse(cached);
            allData = data;
            renderData(data);
            showToast('⚠️ Menampilkan data cache (offline)', 'warning');
          } catch {}
        } else {
          showEmptyState('❌ Tidak dapat memuat data', 'Periksa koneksi internet atau izin akses Google Sheets');
        }
      }
    }

    // 📄 Parse CSV (Kolom A = judul, Kolom B = deskripsi)
    function parseCSV(csv) {
      const lines = csv.split('\n').filter(line => line.trim());
      const result = [];
      
      for (let i = 0; i < lines.length; i++) {
        // Handle CSV dengan koma di dalam field (simple parser)
        const row = parseCSVLine(lines[i]);
        if (row.length >= 2 && row[0].trim() && row[1].trim()) {
          const title = row[0].trim();
          const description = row[1].trim()
            .replace(/<br\s*\/?>/gi, '\n')  // Convert <br> to newline for display
            .replace(/\\n/g, '\n');
          
          // Auto-detect category from title keywords
          const category = detectCategory(title);
          categories.add(category);
          
          result.push({
            id: i,
            title,
            description,
            category,
            timestamp: new Date().toISOString()
          });
        }
      }
      return result;
    }

    // Simple CSV line parser (handles quoted fields)
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current.trim());
      return result;
    }

    // 🏷️ Auto-detect category from title
    function detectCategory(title) {
      const lower = title.toLowerCase();
      if (lower.includes('deposit')) return 'deposit';
      if (lower.includes('withdraw') || lower.includes('tarik')) return 'withdraw';
      if (lower.includes('promo') || lower.includes('bonus')) return 'promo';
      if (lower.includes('info') || lower.includes('panduan')) return 'info';
      if (lower.includes('syarat') || lower.includes('ketentuan')) return 'rules';
      return 'lainnya';
    }

    // 🎨 Render Data Cards
    function renderData(data, filter = 'all', search = '') {
      const container = document.getElementById('dataContainer');
      
      // Filter + Search
      let filtered = data.filter(item => {
        const matchCategory = filter === 'all' || item.category === filter;
        const matchSearch = !search || 
          item.title.toLowerCase().includes(search.toLowerCase()) ||
          item.description.toLowerCase().includes(search.toLowerCase());
        return matchCategory && matchSearch;
      });

      if (filtered.length === 0) {
        showEmptyState(
          search ? '🔍 Tidak ditemukan' : '📭 Belum ada data',
          search ? 'Coba kata kunci lain' : 'Data akan muncul setelah sinkronisasi'
        );
        return;
      }

      container.innerHTML = filtered.map(item => `
        <div class="data-card" data-category="${item.category}" data-id="${item.id}">
          <h3 class="card-title">
            ${escapeHtml(item.title)}
            <span class="badge">${item.category}</span>
          </h3>
          <div class="card-content">${escapeHtml(item.description)}</div>
          <div class="card-footer">
            <span>🆔 #${item.id + 1}</span>
            <button class="copy-btn" onclick="copyContent(this, ${item.id})">📋 Salin</button>
          </div>
        </div>
      `).join('');

      // Update category menu
      renderCategoryMenu();
    }

    // 🧭 Render Dynamic Category Menu
    function renderCategoryMenu() {
      const menu = document.getElementById('categoryMenu');
      const existing = menu.querySelectorAll('.nav-link[data-cat]');
      existing.forEach(el => el.parentElement.remove());

      [...categories].sort().forEach(cat => {
        const count = allData.filter(d => d.category === cat).length;
        const icons = {
          deposit: '💰', withdraw: '💸', promo: '🎁', 
          info: 'ℹ️', rules: '📜', lainnya: '📦'
        };
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.innerHTML = `
          <div class="nav-link" data-cat="${cat}" onclick="filterData('${cat}', this)">
            <span class="icon">${icons[cat] || '📌'}</span> 
            ${cat.charAt(0).toUpperCase() + cat.slice(1)} 
            <span style="margin-left:auto; background:rgba(255,255,255,0.1); padding:2px 8px; border-radius:10px; font-size:0.75rem;">${count}</span>
          </div>
        `;
        menu.appendChild(li);
      });
    }

    // 🔍 Search Functionality
    function searchData() {
      const query = document.getElementById('searchInput').value.trim();
      const activeCat = document.querySelector('.nav-link.active')?.dataset.cat || 'all';
      renderData(allData, activeCat, query);
    }

    // 🎯 Filter by Category
    function filterData(category, element) {
      // Update active state
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      if (element) element.classList.add('active');
      
      // Re-render with filter
      const search = document.getElementById('searchInput').value.trim();
      renderData(allData, category, search);
      
      // Close sidebar on mobile after selection
      if (window.innerWidth <= 992) {
        document.getElementById('sidebar').classList.remove('active');
      }
    }

    // 📋 Copy to Clipboard
    function copyContent(btn, id) {
      const item = allData.find(d => d.id === id);
      if (!item) return;
      
      const text = `${item.title}\n\n${item.description}`;
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = '✓ Tersalin!';
        showToast('📋 Konten berhasil disalin!', 'success');
        
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '📋 Salin';
        }, 2000);
      }).catch(() => {
        showToast('❌ Gagal menyalin', 'error');
      });
    }

    // 🔄 Refresh Data
    function refreshData() {
      showToast('🔄 Memuat data terbaru...', 'info');
      loadData(true);
    }

    // 💾 Export to JSON
    function exportData() {
      if (allData.length === 0) {
        showToast('⚠️ Tidak ada data untuk diekspor', 'warning');
        return;
      }
      
      const blob = new Blob([JSON.stringify(allData, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `anime-data-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('💾 Data berhasil diekspor!', 'success');
    }

    // 🎨 UI Helpers
    function updateSyncStatus(status, text) {
      const dot = document.getElementById('syncDot');
      const txt = document.getElementById('syncText');
      
      dot.className = 'sync-dot';
      if (status === 'loading') dot.classList.add('loading');
      else if (status === 'error') dot.classList.add('error');
      
      txt.textContent = text;
    }

    function showEmptyState(title, message) {
      document.getElementById('dataContainer').innerHTML = `
        <div class="empty-state">
          <span class="emoji">🎌</span>
          <strong>${title}</strong>
          <p>${message}</p>
          <button class="btn btn-primary" onclick="refreshData()">🔄 Coba Lagi</button>
        </div>
      `;
    }

    function showToast(message, type = 'info') {
      // Remove existing toasts
      document.querySelectorAll('.toast').forEach(t => t.remove());
      
      const colors = {
        success: '#00c853', warning: '#ffd54f', error: '#ff5252', info: '#4facfe'
      };
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.borderLeftColor = colors[type] || colors.info;
      toast.innerHTML = `<span>${message}</span>`;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(timestamp) {
      return new Date(timestamp).toLocaleString('id-ID', {
        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
      });
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('active');
    }

    function setupEventListeners() {
      // Close sidebar when clicking outside on mobile
      document.addEventListener('click', (e) => {
        const sidebar = document.getElementById('sidebar');
        const toggle = document.querySelector('.menu-toggle');
        if (window.innerWidth <= 992 && 
            !sidebar.contains(e.target) && 
            !toggle?.contains(e.target) && 
            sidebar.classList.contains('active')) {
          sidebar.classList.remove('active');
        }
      });

      // Keyboard shortcut: Ctrl+R to refresh
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'r') {
          e.preventDefault();
          refreshData();
        }
      });
    }
  </script>
</body>
</html>
