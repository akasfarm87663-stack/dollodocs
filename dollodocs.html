<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📚 Anime Data Viewer</title>
  <style>
    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
    }

    /* ===== SIDEBAR ANIME THEME ===== */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #2d1b3e 0%, #1a1a2e 100%);
      border-right: 2px solid #e94560;
      padding: 20px 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      box-shadow: 4px 0 20px rgba(233, 69, 96, 0.3);
      z-index: 100;
    }

    .sidebar-header {
      padding: 15px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(233, 69, 96, 0.4);
      margin-bottom: 15px;
    }

    .sidebar-header h2 {
      font-size: 1.4rem;
      color: #e94560;
      text-shadow: 0 0 10px rgba(233, 69, 96, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .sidebar-header h2::before {
      content: "🌸";
      font-size: 1.2rem;
    }

    .search-box {
      padding: 0 15px 15px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 15px;
      border: 2px solid #e94560;
      border-radius: 25px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s;
    }

    .search-box input:focus {
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
    }

    .menu-list {
      list-style: none;
      padding: 0 10px;
      max-height: calc(100vh - 180px);
      overflow-y: auto;
    }

    .menu-list::-webkit-scrollbar {
      width: 6px;
    }

    .menu-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
    }

    .menu-list::-webkit-scrollbar-thumb {
      background: #e94560;
      border-radius: 3px;
    }

    .menu-item {
      padding: 12px 15px;
      margin: 5px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      border-left: 3px solid transparent;
    }

    .menu-item:hover {
      background: rgba(233, 69, 96, 0.2);
      transform: translateX(5px);
    }

    .menu-item.active {
      background: rgba(233, 69, 96, 0.35);
      border-left-color: #e94560;
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
    }

    .menu-item::before {
      content: "✨";
      font-size: 1rem;
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex: 1;
      margin-left: 280px;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .content-header {
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(233, 69, 96, 0.4);
    }

    .content-header h1 {
      font-size: 1.8rem;
      color: #e94560;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .content-header h1::before {
      content: "🎌";
    }

    .content-display {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(233, 69, 96, 0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      min-height: 400px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content-display h2 {
      color: #ff9e6d;
      margin-bottom: 15px;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .content-display h2::before {
      content: "📝";
    }

    .content-display .description {
      line-height: 1.8;
      font-size: 1.05rem;
      color: #e0e0ff;
      white-space: pre-wrap;
    }

    .content-display .description br {
      display: block;
      content: "";
      margin: 8px 0;
    }

    /* ===== LOADING & EMPTY STATES ===== */
    .loading, .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #aaa;
    }

    .loading::before {
      content: "⏳";
      font-size: 2rem;
      display: block;
      margin-bottom: 15px;
      animation: spin 1.5s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state::before {
      content: "🗂️";
      font-size: 2.5rem;
      display: block;
      margin-bottom: 15px;
    }

    /* ===== STATUS BAR ===== */
    .status-bar {
      margin-top: 20px;
      padding: 10px 15px;
      background: rgba(233, 69, 96, 0.15);
      border-radius: 10px;
      font-size: 0.85rem;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-bar::before {
      content: "💾";
    }

    .status-bar.success {
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
    }

    .status-bar.success::before {
      content: "✅";
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 2px solid #e94560;
      }
      .main-content {
        margin-left: 0;
      }
      .menu-list {
        display: flex;
        flex-wrap: wrap;
        max-height: none;
        padding: 0 10px 15px;
      }
      .menu-item {
        flex: 0 0 auto;
        margin: 3px;
        padding: 8px 12px;
        font-size: 0.85rem;
      }
    }

    /* ===== ANIME DECORATIONS ===== */
    .anime-decoration {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      opacity: 0.1;
      font-size: 3rem;
      animation: float 6s ease-in-out infinite;
    }

    .anime-decoration:nth-child(1) { top: 10%; right: 5%; animation-delay: 0s; }
    .anime-decoration:nth-child(2) { bottom: 15%; left: 3%; animation-delay: 2s; }
    .anime-decoration:nth-child(3) { top: 40%; right: 15%; animation-delay: 4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
  </style>
</head>
<body>

  <!-- Anime Decorations -->
  <div class="anime-decoration">🌸</div>
  <div class="anime-decoration">⭐</div>
  <div class="anime-decoration">🎀</div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>📚 Data Anime</h2>
    </div>
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Cari judul..." />
    </div>
    
    <ul class="menu-list" id="menuList">
      <li class="loading">Memuat data...</li>
    </ul>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="content-header">
      <h1>Detail Informasi</h1>
    </div>
    
    <div class="content-display" id="contentDisplay">
      <div class="empty-state">Pilih judul dari menu untuk melihat detail</div>
    </div>
    
    <div class="status-bar" id="statusBar">
      Menunggu data dari Google Sheets...
    </div>
  </main>

  <script>
    // ===== KONFIGURASI =====
    const SHEET_ID = '1xlBUoiw1h1LxL6I6JM58XHzWsOQtZX9glxt-ndwQO9k';
    const GID = '0';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
    const STORAGE_KEY = 'animeSheetData_v1';
    const CACHE_DURATION = 30 * 60 * 1000; // 30 menit

    // ===== STATE =====
    let sheetData = [];
    let filteredData = [];

    // ===== DOM ELEMENTS =====
    const menuList = document.getElementById('menuList');
    const contentDisplay = document.getElementById('contentDisplay');
    const statusBar = document.getElementById('statusBar');
    const searchInput = document.getElementById('searchInput');

    // ===== FUNGSI UTILITAS =====
    function parseCSV(csvText) {
      const lines = csvText.split('\n').filter(line => line.trim());
      const result = [];
      
      for (let line of lines) {
        // Handle CSV dengan koma dan tanda kutip
        const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
        if (matches && matches.length >= 2) {
          const title = matches[0]?.replace(/^"|"$/g, '').trim();
          const description = matches[1]?.replace(/^"|"$/g, '').trim();
          
          if (title && description) {
            result.push({
              id: result.length,
              title: title,
              description: description.replace(/<br>/g, '\n') // Konversi <br> ke newline untuk display
            });
          }
        }
      }
      return result;
    }

    function formatDescription(text) {
      // Konversi newline ke <br> untuk HTML display
      return text.replace(/\n/g, '<br>');
    }

    function updateStatus(message, isSuccess = false) {
      statusBar.textContent = message;
      statusBar.className = 'status-bar' + (isSuccess ? ' success' : '');
    }

    function saveToLocalStorage(data) {
      try {
        const payload = {
          data: data,
          timestamp: Date.now()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        return true;
      } catch (e) {
        console.warn('Gagal simpan ke localStorage:', e);
        return false;
      }
    }

    function getFromLocalStorage() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return null;
        
        const parsed = JSON.parse(stored);
        // Cek apakah cache masih valid (30 menit)
        if (Date.now() - parsed.timestamp < CACHE_DURATION) {
          return parsed.data;
        }
      } catch (e) {
        console.warn('Gagal baca localStorage:', e);
      }
      return null;
    }

    // ===== FUNGSI UTAMA =====
    async function fetchSheetData() {
      // Coba ambil dari cache dulu
      const cached = getFromLocalStorage();
      if (cached) {
        console.log('✅ Menggunakan data dari cache');
        sheetData = cached;
        filteredData = [...sheetData];
        renderMenu();
        updateStatus(`Data dimuat dari cache (${cached.length} item)`, true);
        return;
      }

      updateStatus('🔄 Mengambil data dari Google Sheets...');
      
      try {
        const response = await fetch(CSV_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const csvText = await response.text();
        sheetData = parseCSV(csvText);
        filteredData = [...sheetData];
        
        // Simpan ke localStorage
        if (saveToLocalStorage(sheetData)) {
          updateStatus(`✅ Data tersimpan! (${sheetData.length} item)`, true);
        } else {
          updateStatus(`✅ Data dimuat (${sheetData.length} item)`, true);
        }
        
        renderMenu();
        
      } catch (error) {
        console.error('❌ Error fetch data:', error);
        updateStatus(`⚠️ Gagal memuat: ${error.message}. Cek koneksi atau sharing setting Sheets.`);
        menuList.innerHTML = '<li class="empty-state">Gagal memuat data 😢</li>';
      }
    }

    function renderMenu() {
      if (filteredData.length === 0) {
        menuList.innerHTML = '<li class="empty-state">Tidak ada data ditemukan</li>';
        return;
      }

      menuList.innerHTML = filteredData.map((item, index) => `
        <li class="menu-item ${index === 0 ? 'active' : ''}" 
            data-id="${item.id}"
            onclick="selectItem(${item.id})">
          ${escapeHtml(item.title)}
        </li>
      `).join('');
      
      // Auto select item pertama
      if (filteredData.length > 0) {
        displayContent(filteredData[0]);
      }
    }

    function selectItem(id) {
      // Update active state
      document.querySelectorAll('.menu-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.id) === id);
      });
      
      // Tampilkan konten
      const item = sheetData.find(d => d.id === id);
      if (item) displayContent(item);
    }

    function displayContent(item) {
      contentDisplay.innerHTML = `
        <h2>${escapeHtml(item.title)}</h2>
        <div class="description">${formatDescription(escapeHtml(item.description))}</div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function filterData(query) {
      const lowerQuery = query.toLowerCase().trim();
      if (!lowerQuery) {
        filteredData = [...sheetData];
      } else {
        filteredData = sheetData.filter(item => 
          item.title.toLowerCase().includes(lowerQuery) ||
          item.description.toLowerCase().includes(lowerQuery)
        );
      }
      renderMenu();
    }

    // ===== EVENT LISTENERS =====
    searchInput.addEventListener('input', (e) => {
      filterData(e.target.value);
    });

    // Auto-refresh cache setiap 30 menit jika halaman tetap terbuka
    setInterval(() => {
      const cached = getFromLocalStorage();
      if (!cached) fetchSheetData(); // Refresh jika cache expired
    }, CACHE_DURATION);

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      fetchSheetData();
    });

    // Expose selectItem ke global scope untuk onclick handler
    window.selectItem = selectItem;
  </script>
</body>
</html>
